<link rel="stylesheet" href="asset/page/stage/stage.css" />

<div class="page" id="stage">
    <canvas id="canvas"></canvas>
</div>

<div class="page" id="clear" data-layer="1" data-gotoable>
    <p class="game-over">--::[ 作戦成功 ]::--</p>

    <div class="options" data-direction="row">
        <button class="back">Next</button>
        <button class="retry">Retry</button>
    </div>
</div>

<div class="page" id="retry" data-layer="1" data-gotoable>
    <p class="game-over">--::[ 作戦失敗 ]::--</p>

    <div class="options" data-direction="row">
        <button class="back">Back</button>
        <button class="retry">Retry</button>
    </div>
</div>
